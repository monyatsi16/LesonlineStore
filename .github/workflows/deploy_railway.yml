name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Build
        run: npm run build --if-present
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Authenticate Railway
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
        run: |
          railway login --apiKey "$RAILWAY_API_KEY"

      - name: Deploy to Railway
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: |
          if [ -n "$RAILWAY_PROJECT_ID" ]; then
            railway up --detach --project "$RAILWAY_PROJECT_ID"
          else
            railway up --detach
          fi
          if [ -n "$RAILWAY_ENVIRONMENT" ]; then
            echo "Deployed using Railway environment: $RAILWAY_ENVIRONMENT"
          fi
